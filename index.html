<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V12 AI RPG Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0d18;
  color:white;
  text-align:center;
}

.scene { display:none; padding:20px; }
.scene.active { display:block; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2a2f55;
  color:white;
  cursor:pointer;
}

button:hover { background:#3c4280; }

.petCard {
  background:rgba(255,255,255,0.08);
  margin:10px auto;
  padding:10px;
  width:260px;
  border-radius:10px;
}

.hpBar {
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.hpBar div {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#00c3ff);
}

#log {
  max-height:160px;
  overflow:auto;
  font-size:14px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="scene active">
  <h1>🐾 V12 AI RPG ENGINE</h1>
  <div id="petList"></div>

  <button onclick="Game.createPet('Fox')">Fox 🔥</button>
  <button onclick="Game.createPet('Cat')">Cat 🌙</button>
  <button onclick="Game.createPet('Dog')">Dog ⚡</button>
</div>

<!-- BATTLE -->
<div id="battle" class="scene">
  <h2>⚔️ AI Battle System</h2>

  <div id="playerName"></div>
  <div class="hpBar"><div id="playerHP"></div></div>

  <br>

  <div id="enemyName"></div>
  <div class="hpBar"><div id="enemyHP"></div></div>

  <h3>Actions</h3>

  <div id="actions"></div>

  <div id="log"></div>
</div>

<script>
/* =========================
   GAME CORE
========================= */

const Game = {
  state: {
    pets: JSON.parse(localStorage.getItem("pets")) || [],
    active: null,
    battle: null
  },

  scenes: {
    menu: document.getElementById("menu"),
    battle: document.getElementById("battle")
  },

  setScene(s) {
    Object.values(this.scenes).forEach(x => x.classList.remove("active"));
    this.scenes[s].classList.add("active");
  },

  save() {
    localStorage.setItem("pets", JSON.stringify(this.state.pets));
  },

  init() {
    this.render();
  },

  createPet(type) {
    if (this.state.pets.length >= 5) return alert("Max 5 pets");

    this.state.pets.push({
      id: Date.now(),
      type,
      level: 1,
      stats: {
        hp: 20,
        maxHp: 20,
        atk: 4,
        def: 2,
        spd: 2
      }
    });

    this.save();
    this.render();
  },

  selectPet(id) {
    this.state.active = this.state.pets.find(p => p.id === id);
    Battle.start();
  },

  render() {
    const list = document.getElementById("petList");
    list.innerHTML = "";

    this.state.pets.forEach(p => {
      const d = document.createElement("div");
      d.className = "petCard";

      d.innerHTML = `
        ${p.type} Lv.${p.level}<br>
        <button onclick="Game.selectPet(${p.id})">Battle</button>
      `;

      list.appendChild(d);
    });
  }
};

/* =========================
   BATTLE V12
========================= */

const Battle = {
  start() {
    let p = Game.state.active;

    let e = {
      type: "Enemy AI",
      stats: {
        hp: 22,
        maxHp: 22,
        atk: 4,
        def: 2,
        spd: 2
      },
      cooldowns: { heavy: 0, heal: 0, defend: 0 }
    };

    Game.state.battle = {
      p: structuredClone(p),
      e,
      pCooldowns: { heavy: 0, heal: 0, defend: 0 }
    };

    let b = Game.state.battle;
    b.p.stats.hp = b.p.stats.maxHp;

    this.updateUI();
    this.renderActions();

    Game.setScene("battle");
    this.log("Battle started!");
  },

  /* =========================
     PLAYER ACTIONS
  ========================= */

  act(type) {
    let b = Game.state.battle;

    if (type === "attack") {
      let dmg = this.damage(b.p, b.e);
      b.e.stats.hp -= dmg;
      this.log("You attack for " + dmg);
    }

    if (type === "heavy") {
      if (b.pCooldowns.heavy > 0) return this.log("Heavy on cooldown!");
      let dmg = this.damage(b.p, b.e) * 2;
      b.e.stats.hp -= dmg;
      b.pCooldowns.heavy = 2;
      this.log("Heavy hit " + dmg);
    }

    if (type === "heal") {
      if (b.pCooldowns.heal > 0) return this.log("Heal cooldown!");
      b.p.stats.hp += 6;
      if (b.p.stats.hp > b.p.stats.maxHp)
        b.p.stats.hp = b.p.stats.maxHp;

      b.pCooldowns.heal = 3;
      this.log("You heal +6");
    }

    if (type === "defend") {
      b.p.defending = 1;
      this.log("You defend");
    }

    this.enemyTurn();
    this.tickCooldowns();
    this.updateUI();
    this.checkEnd();
  },

  /* =========================
     ENEMY AI
  ========================= */

  enemyTurn() {
    let b = Game.state.battle;
    let e = b.e;

    let hpRatio = e.stats.hp / e.stats.maxHp;

    let action;

    if (hpRatio < 0.3 && e.cooldowns.heal === 0) {
      action = "heal";
    }
    else if (Math.random() < 0.3 && e.cooldowns.heavy === 0) {
      action = "heavy";
    }
    else if (hpRatio < 0.6 && Math.random() < 0.5) {
      action = "defend";
    }
    else {
      action = "attack";
    }

    if (action === "attack") {
      let dmg = this.damage(e, b.p);
      if (b.p.defending) dmg = Math.floor(dmg / 2);

      b.p.stats.hp -= dmg;
      this.log("Enemy attacks " + dmg);
    }

    if (action === "heavy") {
      let dmg = this.damage(e, b.p) * 2;
      if (b.p.defending) dmg = Math.floor(dmg / 2);

      b.p.stats.hp -= dmg;
      e.cooldowns.heavy = 2;

      this.log("Enemy heavy " + dmg);
    }

    if (action === "heal") {
      e.stats.hp += 5;
      if (e.stats.hp > e.stats.maxHp)
        e.stats.hp = e.stats.maxHp;

      e.cooldowns.heal = 3;
      this.log("Enemy heals");
    }

    if (action === "defend") {
      e.defending = 1;
      this.log("Enemy defends");
    }
  },

  /* =========================
     CORE SYSTEMS
  ========================= */

  damage(a, d) {
    return Math.max(1, a.stats.atk - d.stats.def + Math.floor(Math.random() * 3));
  },

  tickCooldowns() {
    let b = Game.state.battle;

    for (let k in b.pCooldowns) {
      if (b.pCooldowns[k] > 0) b.pCooldowns[k]--;
    }

    for (let k in b.e.cooldowns) {
      if (b.e.cooldowns[k] > 0) b.e.cooldowns[k]--;
    }

    b.p.defending = 0;
    b.e.defending = 0;
  },

  updateUI() {
    let b = Game.state.battle;

    document.getElementById("playerName").innerText = b.p.type;
    document.getElementById("enemyName").innerText = b.e.type;

    document.getElementById("playerHP").style.width =
      (b.p.stats.hp / b.p.stats.maxHp) * 100 + "%";

    document.getElementById("enemyHP").style.width =
      (b.e.stats.hp / b.e.stats.maxHp) * 100 + "%";
  },

  renderActions() {
    document.getElementById("actions").innerHTML = `
      <button onclick="Battle.act('attack')">Attack</button>
      <button onclick="Battle.act('heavy')">Heavy</button>
      <button onclick="Battle.act('heal')">Heal</button>
      <button onclick="Battle.act('defend')">Defend</button>
    `;
  },

  checkEnd() {
    let b = Game.state.battle;

    if (b.p.stats.hp <= 0 && b.e.stats.hp <= 0) {
      alert("Draw");
      Game.setScene("menu");
    }
    else if (b.e.stats.hp <= 0) {
      alert("You Win!");
      Game.setScene("menu");
    }
    else if (b.p.stats.hp <= 0) {
      alert("You Lose!");
      Game.setScene("menu");
    }
  },

  log(t) {
    const d = document.createElement("div");
    d.innerText = t;
    document.getElementById("log").appendChild(d);
  }
};

Game.init();
</script>

</body>
</html>
