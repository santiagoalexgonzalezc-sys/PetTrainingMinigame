<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 Pet Training RPG</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,#131827,#0b0d18);
    color:white;
    text-align:center;
}

.screen{display:none;padding:20px;}
.screen.active{display:block;}

button{
    border:none;
    border-radius:12px;
    padding:10px 16px;
    cursor:pointer;
    color:white;
    background:#2f3b7a;
    margin:4px;
    transition:.15s;
}

button:hover{transform:translateY(-2px);}

.petCard{
    width:min(450px,90%);
    margin:10px auto;
    background:rgba(255,255,255,.06);
    border-radius:16px;
    padding:14px;
}

.stat{opacity:.9;font-size:.95rem;}

.xpBar{
    width:100%;
    height:18px;
    background:#1f2230;
    border-radius:999px;
    overflow:hidden;
}

.xpFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d084,#00b7ff);
}

#barContainer{
    width:min(650px,90%);
    height:34px;
    background:#1d2232;
    border-radius:999px;
    margin:35px auto;
    position:relative;
    overflow:hidden;
}

.zone{
    position:absolute;
    height:100%;
}

#goodZone{
    left:20%;
    width:40%;
    background:rgba(0,255,140,.12);
}

#perfectZone{
    left:47%;
    width:6%;
    background:rgba(255,255,140,.4);
}

#marker{
    position:absolute;
    width:8px;
    height:100%;
    background:white;
    box-shadow:0 0 10px white;
}

.bigResult{
    font-size:1.3rem;
    margin-top:15px;
    min-height:40px;
}

.infoBox{
    width:min(500px,90%);
    margin:auto;
    background:rgba(255,255,255,.06);
    border-radius:16px;
    padding:16px;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="mainScreen" class="screen active">
    <h1>🐾 Pet Training RPG</h1>
    <p>Max 5 pets</p>

    <div id="petList"></div>

    <button onclick="createPet('Fox')">🦊 Fox</button>
    <button onclick="createPet('Cat')">🐱 Cat</button>
    <button onclick="createPet('Dog')">🐶 Dog</button>
</div>

<!-- PET -->
<div id="petScreen" class="screen">
    <h2 id="petTitle"></h2>

    <div class="infoBox">
        <div id="petEvolution"></div>
        <br>

        <div id="petLevel"></div>
        <div id="petXP"></div>

        <div class="xpBar">
            <div id="petXPFill" class="xpFill"></div>
        </div>

        <br>

        <div id="petStats"></div>

        <br>

        <button onclick="openTraining()">🎯 Train</button>
        <button onclick="showScreen('mainScreen')">⬅ Back</button>
    </div>
</div>

<!-- TRAIN -->
<div id="trainingScreen" class="screen">
    <h2>🎯 Training</h2>

    <p>Hit GOOD or PERFECT!</p>

    <div id="barContainer">
        <div id="goodZone" class="zone"></div>
        <div id="perfectZone" class="zone"></div>
        <div id="marker"></div>
    </div>

    <button id="stopBtn">STOP</button>
    <button onclick="returnToPet()">Back</button>

    <div id="trainResult" class="bigResult"></div>

    <h3 id="sessionXP">Session XP: 0</h3>
    <h3 id="misses">Misses: 0 / 3</h3>
</div>

<script>
let pets = JSON.parse(localStorage.getItem("pets")) || [];
let selectedPet = null;

let trainingRunning = false;
let markerPos = 0;
let direction = 1;
let animId = null;

let sessionXP = 0;
let missCount = 0;
let speed = 0.7;

/* SAVE */
function save(){
    localStorage.setItem("pets", JSON.stringify(pets));
}

/* SCREENS */
function showScreen(id){
    document.querySelectorAll(".screen")
        .forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* XP SYSTEM */
function xpNeeded(level){
    return level * 100;
}

/* EVOLUTION */
function getEvolution(pet){
    const evo={
        Fox:["🦊 Fox","🔥 Swift Fox","👑 Spirit Fox"],
        Cat:["🐱 Cat","🌙 Shadow Cat","⭐ Star Cat"],
        Dog:["🐶 Dog","🛡 Alpha Dog","👑 Guardian Dog"]
    };
    if(pet.level>=10) return evo[pet.type][2];
    if(pet.level>=5) return evo[pet.type][1];
    return evo[pet.type][0];
}

/* CREATE PET */
function createPet(type){
    if(pets.length>=5) return alert("Max 5 pets");

    pets.push({
        id:Date.now(),
        type,
        level:1,
        xp:0,
        stats:{power:1,agility:1}
    });

    save();
    renderPets();
}

/* DELETE */
function deletePet(id){
    pets=pets.filter(p=>p.id!==id);
    save();
    renderPets();
}

/* RENDER */
function renderPets(){
    const list=document.getElementById("petList");
    list.innerHTML="";

    pets.forEach(p=>{
        const need=xpNeeded(p.level);
        const pct=(p.xp/need)*100;

        const div=document.createElement("div");
        div.className="petCard";

        div.innerHTML=`
            <h3>${getEvolution(p)}</h3>
            <div>Level ${p.level}</div>

            <div class="xpBar">
                <div class="xpFill" style="width:${pct}%"></div>
            </div>

            <div>XP ${p.xp}/${need}</div>

            <button onclick="selectPet(${p.id})">Select</button>
            <button onclick="deletePet(${p.id})">Delete</button>
        `;

        list.appendChild(div);
    });
}

/* SELECT */
function selectPet(id){
    selectedPet=pets.find(p=>p.id===id);
    updatePetScreen();
    showScreen("petScreen");
}

/* UPDATE */
function updatePetScreen(){
    const p=selectedPet;
    const need=xpNeeded(p.level);

    document.getElementById("petTitle").innerText=p.type;
    document.getElementById("petEvolution").innerText=getEvolution(p);
    document.getElementById("petLevel").innerText="Level "+p.level;
    document.getElementById("petXP").innerText=`XP ${p.xp}/${need}`;
    document.getElementById("petXPFill").style.width=(p.xp/need)*100+"%";

    document.getElementById("petStats").innerHTML=
        `Power: ${p.stats.power}<br>Agility: ${p.stats.agility}`;
}

/* TRAIN START */
function openTraining(){
    sessionXP=0;
    missCount=0;
    speed=0.7;

    document.getElementById("sessionXP").innerText="Session XP: 0";
    document.getElementById("misses").innerText="Misses: 0 / 3";
    document.getElementById("trainResult").innerText="";

    showScreen("trainingScreen");
    startTraining();
}

function startTraining(){
    cancelAnimationFrame(animId);

    trainingRunning=true;
    markerPos=0;
    direction=1;

    const marker=document.getElementById("marker");

    function loop(){
        if(!trainingRunning) return;

        markerPos+=direction*speed;

        if(markerPos>=100){markerPos=100;direction=-1;}
        if(markerPos<=0){markerPos=0;direction=1;}

        marker.style.left=markerPos+"%";

        animId=requestAnimationFrame(loop);
    }

    loop();
}

/* STOP */
document.getElementById("stopBtn").addEventListener("click",()=>{

    if(!trainingRunning) return;

    trainingRunning=false;

    let xp=0;
    let text="";

    if(markerPos>=47 && markerPos<=53){
        xp=35;
        text="🌟 PERFECT +35";
        speed+=0.08;
    }
    else if(markerPos>=15 && markerPos<=85){
        xp=20;
        text="✅ GOOD +20";
        speed+=0.05;
    }
    else{
        xp=0;
        missCount++;
        text=`❌ MISS (${missCount}/3)`;
        speed=Math.max(0.5,speed-0.03);
    }

    sessionXP+=xp;

    document.getElementById("trainResult").innerText=text;
    document.getElementById("sessionXP").innerText=`Session XP: ${sessionXP}`;
    document.getElementById("misses").innerText=`Misses: ${missCount}/3`;

    if(missCount>=3){

        gainXP(selectedPet,sessionXP);
        save();

        setTimeout(()=>{

            alert(`Training Complete!\nXP Earned: ${sessionXP}`);

            updatePetScreen();
            showScreen("petScreen");

        },300);

        return;
    }

    setTimeout(()=>startTraining(),200);
});

/* LEVELING */
function gainXP(pet,amount){

    pet.xp+=amount;

    while(pet.xp>=xpNeeded(pet.level)){
        pet.xp-=xpNeeded(pet.level);
        pet.level++;

        pet.stats.power++;
        pet.stats.agility++;

        if(pet.level%5===0){
            pet.stats.power+=2;
        }
    }
}

renderPets();
</script>

</body>
</html>
