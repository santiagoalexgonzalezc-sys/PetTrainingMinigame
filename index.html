<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V11 Combat RPG Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0d18;
  color:white;
  text-align:center;
}

.scene { display:none; padding:20px; }
.scene.active { display:block; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2a2f55;
  color:white;
  cursor:pointer;
}
button:hover { background:#3c4280; }

.petCard {
  background:rgba(255,255,255,0.08);
  margin:10px auto;
  padding:10px;
  width:260px;
  border-radius:10px;
}

.hpBar {
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}
.hpBar div {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#00c3ff);
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="scene active">
  <h1>🐾 V11 RPG COMBAT</h1>
  <div id="petList"></div>

  <button onclick="Game.createPet('Fox')">Fox 🔥</button>
  <button onclick="Game.createPet('Cat')">Cat 🌙</button>
  <button onclick="Game.createPet('Dog')">Dog ⚡</button>
</div>

<!-- BATTLE -->
<div id="battle" class="scene">
  <h2>⚔️ Battle</h2>

  <div id="playerName"></div>
  <div class="hpBar"><div id="playerHP"></div></div>

  <br>

  <div id="enemyName"></div>
  <div class="hpBar"><div id="enemyHP"></div></div>

  <h3>Skills</h3>
  <div id="skills"></div>

  <div id="log"></div>
</div>

<script>
/* =========================
   GAME CORE
========================= */

const Game = {
  state: {
    pets: JSON.parse(localStorage.getItem("pets")) || [],
    active: null,
    battle: null
  },

  scenes: {
    menu: document.getElementById("menu"),
    battle: document.getElementById("battle")
  },

  setScene(s) {
    Object.values(this.scenes).forEach(x => x.classList.remove("active"));
    this.scenes[s].classList.add("active");
  },

  save() {
    localStorage.setItem("pets", JSON.stringify(this.state.pets));
  },

  init() {
    this.render();
  },

  createPet(type) {
    if (this.state.pets.length >= 5) return alert("Max 5");

    this.state.pets.push({
      id: Date.now(),
      type,
      level: 1,
      stats: {
        hp: 20,
        maxHp: 20,
        atk: 4,
        def: 2,
        spd: 2
      }
    });

    this.save();
    this.render();
  },

  selectPet(id) {
    this.state.active = this.state.pets.find(p => p.id === id);
    Battle.start();
  },

  render() {
    const list = document.getElementById("petList");
    list.innerHTML = "";

    this.state.pets.forEach(p => {
      const d = document.createElement("div");
      d.className = "petCard";

      d.innerHTML = `
        ${p.type} Lv.${p.level}<br>
        <button onclick="Game.selectPet(${p.id})">Fight</button>
      `;

      list.appendChild(d);
    });
  }
};

/* =========================
   ELEMENT SYSTEM
========================= */

function element(type) {
  if (type === "Fox") return "fire";
  if (type === "Cat") return "shadow";
  return "lightning";
}

/* =========================
   BATTLE V11
========================= */

const Battle = {
  start() {
    let p = Game.state.active;

    let e = {
      type: "Enemy",
      element: "shadow",
      stats: {
        hp: 18,
        maxHp: 18,
        atk: 3,
        def: 1,
        spd: 2
      }
    };

    Game.state.battle = { p: structuredClone(p), e };

    this.updateSkills();
    this.update();

    Game.setScene("battle");
    this.log("Battle started!");
  },

  updateSkills() {
    const s = document.getElementById("skills");

    s.innerHTML = `
      <button onclick="Battle.skill('attack')">Attack</button>
      <button onclick="Battle.skill('heavy')">Heavy (CD)</button>
      <button onclick="Battle.skill('heal')">Heal</button>
    `;
  },

  skill(type) {
    let b = Game.state.battle;

    let crit = Math.random() < 0.2;
    let dodge = Math.random() < 0.1;

    if (type === "attack") {
      let dmg = this.calc(b.p, b.e, 1);
      if (!dodge) b.e.stats.hp -= dmg;
      this.log("Attack: " + dmg);
    }

    if (type === "heavy") {
      let dmg = this.calc(b.p, b.e, 2);
      if (!dodge) b.e.stats.hp -= dmg;
      this.log("Heavy Hit: " + dmg);
    }

    if (type === "heal") {
      b.p.stats.hp += 4;
      if (b.p.stats.hp > b.p.stats.maxHp)
        b.p.stats.hp = b.p.stats.maxHp;

      this.log("Heal +4");
    }

    this.enemyTurn();
    this.update();
    this.checkEnd();
  },

  calc(p, e, mult) {
    let base = p.stats.atk * mult;

    let typeAdv =
      (element(p.type) === "fire" && e.element === "shadow") ? 1.3 :
      (element(p.type) === "shadow" && e.element === "lightning") ? 1.3 :
      (element(p.type) === "lightning" && e.element === "fire") ? 1.3 : 1;

    let crit = Math.random() < 0.2 ? 2 : 1;

    return Math.floor(base * typeAdv * crit);
  },

  enemyTurn() {
    let b = Game.state.battle;

    let dmg = Math.max(1, b.e.stats.atk - b.p.stats.def);

    b.p.stats.hp -= dmg;

    this.log("Enemy hits " + dmg);
  },

  update() {
    let b = Game.state.battle;

    document.getElementById("playerName").innerText = b.p.type;
    document.getElementById("enemyName").innerText = "Enemy";

    document.getElementById("playerHP").style.width =
      (b.p.stats.hp / b.p.stats.maxHp) * 100 + "%";

    document.getElementById("enemyHP").style.width =
      (b.e.stats.hp / b.e.stats.maxHp) * 100 + "%";
  },

  checkEnd() {
    let b = Game.state.battle;

    if (b.p.stats.hp <= 0 && b.e.stats.hp <= 0) {
      alert("Draw");
      Game.setScene("menu");
    }
    else if (b.e.stats.hp <= 0) {
      alert("You Win!");
      Game.setScene("menu");
    }
    else if (b.p.stats.hp <= 0) {
      alert("You Lose!");
      Game.setScene("menu");
    }
  },

  log(t) {
    let d = document.createElement("div");
    d.innerText = t;
    document.getElementById("log").appendChild(d);
  }
};

Game.init();
</script>

</body>
</html>
