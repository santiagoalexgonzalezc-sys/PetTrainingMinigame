<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <!-- PET SELECT -->
  <div id="petSelectScreen" class="screen active">
    <h1>🐾 Your Pets</h1>

    <div id="petList"></div>

    <h3>Create Pet</h3>
    <button onclick="createPet('Fox')">🦊 Fox</button>
    <button onclick="createPet('Cat')">🐱 Cat</button>
    <button onclick="createPet('Dog')">🐶 Dog</button>
  </div>

  <!-- TRAINING -->
  <div id="trainingScreen" class="screen">

    <h2>Training</h2>

    <div id="barContainer">
      <div id="perfectZone"></div>
      <div id="marker"></div>
    </div>

    <button id="trainBtn">TRAIN</button>

    <p id="feedback"></p>
    <p id="timer"></p>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="screen">
    <h1>Result</h1>
    <p id="resultText"></p>
    <button onclick="backToMenu()">Back</button>
  </div>

  <!-- BATTLE -->
  <div id="battleScreen" class="screen">

    <h2>⚔️ Battle Arena</h2>

    <div id="battleField">

      <div class="unit">
        <div id="playerName"></div>
        <div class="hpBar"><div id="playerHP"></div></div>
        <div id="playerStats"></div>
      </div>

      <div class="vs">VS</div>

      <div class="unit">
        <div id="enemyName"></div>
        <div class="hpBar"><div id="enemyHP"></div></div>
        <div id="enemyStats"></div>
      </div>

    </div>

    <div id="battleLog"></div>

    <button id="nextTurnBtn">⚡ Next Turn</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
