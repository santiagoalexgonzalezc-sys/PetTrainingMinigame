<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet RPG V10 Engine</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0d18;
  color: white;
  text-align: center;
}

.scene { display:none; padding:20px; }
.scene.active { display:block; }

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2a2f55;
  color: white;
}

button:hover { background:#3c4280; }

.petCard {
  background: rgba(255,255,255,0.08);
  margin: 10px auto;
  padding: 10px;
  width: 260px;
  border-radius: 10px;
}

#barContainer {
  width: 300px;
  height: 20px;
  margin: 20px auto;
  background: #222;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

#perfectZone {
  position: absolute;
  height: 100%;
  background: rgba(0,255,120,0.3);
  left: 40%;
  width: 20%;
}

#marker {
  position: absolute;
  width: 6px;
  height: 100%;
  background: white;
  left: 0%;
}

.hpBar {
  width: 100%;
  height: 12px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

.hpBar div {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#00ff88,#00c3ff);
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="scene active">
  <h1>🐾 V10 RPG ENGINE</h1>
  <div id="petList"></div>

  <button onclick="Game.createPet('Fox')">Fox</button>
  <button onclick="Game.createPet('Cat')">Cat</button>
  <button onclick="Game.createPet('Dog')">Dog</button>
</div>

<!-- TRAIN -->
<div id="training" class="scene">
  <h2>Training</h2>

  <div id="barContainer">
    <div id="perfectZone"></div>
    <div id="marker"></div>
  </div>

  <button onclick="Training.start()">TRAIN</button>
  <p id="feedback"></p>
</div>

<!-- RESULT -->
<div id="result" class="scene">
  <h2>Result</h2>
  <p id="resultText"></p>
  <button onclick="Game.setScene('menu')">Back</button>
</div>

<!-- BATTLE -->
<div id="battle" class="scene">
  <h2>Battle</h2>

  <div id="playerName"></div>
  <div class="hpBar"><div id="playerHP"></div></div>

  <br>

  <div id="enemyName"></div>
  <div class="hpBar"><div id="enemyHP"></div></div>

  <br>

  <button onclick="Battle.turn()">Attack</button>
  <div id="battleLog"></div>
</div>

<script>
/* =========================
   ENGINE CORE
========================= */

const Game = {
  state: {
    pets: JSON.parse(localStorage.getItem("pets")) || [],
    active: null,
    battle: null,
    training: {
      pos: 0,
      dir: 1,
      running: false,
      combo: 0
    }
  },

  scenes: {
    menu: document.getElementById("menu"),
    training: document.getElementById("training"),
    result: document.getElementById("result"),
    battle: document.getElementById("battle")
  },

  setScene(s) {
    Object.values(this.scenes).forEach(sc => sc.classList.remove("active"));
    this.scenes[s].classList.add("active");
  },

  save() {
    localStorage.setItem("pets", JSON.stringify(this.state.pets));
  },

  init() {
    this.render();
    this.setScene("menu");
  },

  createPet(type) {
    if (this.state.pets.length >= 5) return alert("Max 5");

    this.state.pets.push({
      id: Date.now(),
      type,
      level: 1,
      xp: 0,
      xpToLevel: 100,
      stats: { power: 2, hp: 10, maxHp: 10 }
    });

    this.save();
    this.render();
  },

  selectPet(id) {
    this.state.active = this.state.pets.find(p => p.id === id);
    const mode = confirm("OK=Battle Cancel=Train");
    mode ? Battle.start() : Training.open();
  },

  render() {
    const list = document.getElementById("petList");
    list.innerHTML = "";

    this.state.pets.forEach(p => {
      const d = document.createElement("div");
      d.className = "petCard";

      d.innerHTML = `
        ${p.type} Lv.${p.level}<br>
        XP ${p.xp}/${p.xpToLevel}<br>
        <button onclick="Game.selectPet(${p.id})">Use</button>
      `;

      list.appendChild(d);
    });
  }
};

/* =========================
   TRAINING V10 (COMBO SYSTEM)
========================= */

const Training = {
  open() {
    Game.setScene("training");

    document.getElementById("perfectZone").style.left = "40%";
    document.getElementById("perfectZone").style.width = "20%";

    document.getElementById("marker").style.left = "0%";
  },

  start() {
    let t = Game.state.training;

    if (t.running) return;

    t.running = true;
    t.pos = 0;
    t.dir = 1;

    let interval = setInterval(() => {
      t.pos += 2 * t.dir;

      if (t.pos >= 100) t.dir = -1;
      if (t.pos <= 0) t.dir = 1;

      document.getElementById("marker").style.left = t.pos + "%";
    }, 16);

    setTimeout(() => {
      clearInterval(interval);
      this.finish();
    }, 2000);
  },

  finish() {
    let t = Game.state.training;
    let p = Game.state.active;

    let pos = t.pos;

    let result =
      pos >= 40 && pos <= 60 ? "perfect" :
      pos >= 30 && pos <= 70 ? "good" :
      pos >= 20 && pos <= 80 ? "ok" : "miss";

    if (result === "perfect") t.combo++;
    else t.combo = 0;

    let multiplier = 1 + t.combo * 0.5;

    let xp =
      (result === "perfect" ? 50 :
      result === "good" ? 25 :
      result === "ok" ? 10 : 3) * multiplier;

    p.xp += xp;

    if (p.xp >= p.xpToLevel) {
      p.level++;
      p.xp = 0;
      p.xpToLevel += 50;
      p.stats.power++;
      p.stats.maxHp++;
    }

    Game.save();

    document.getElementById("resultText").innerText =
      `${result.toUpperCase()} +${Math.floor(xp)} XP (x${multiplier.toFixed(1)})`;

    Game.setScene("result");
    Game.render();
  }
};

/* =========================
   BATTLE V10 (CRIT + DODGE)
========================= */

const Battle = {
  start() {
    let p = Game.state.active;

    let e = {
      type: "Enemy",
      level: p.level,
      stats: {
        power: p.level + 2,
        hp: 10 + p.level * 2,
        maxHp: 10 + p.level * 2
      }
    };

    Game.state.battle = {
      p: structuredClone(p),
      e
    };

    let b = Game.state.battle;
    b.p.stats.hp = b.p.stats.maxHp;
    b.e.stats.hp = b.e.stats.maxHp;

    Game.setScene("battle");
    this.update();
  },

  turn() {
    let b = Game.state.battle;

    let pDmg = this.dmg(b.p);
    let eDmg = this.dmg(b.e);

    b.e.stats.hp -= pDmg;
    b.p.stats.hp -= eDmg;

    this.log(`You hit ${pDmg}`);
    this.log(`Enemy hits ${eDmg}`);

    this.update();

    if (b.p.stats.hp <= 0 || b.e.stats.hp <= 0) {
      alert(b.p.stats.hp > 0 ? "WIN" : "LOSE");
      Game.setScene("menu");
    }
  },

  dmg(u) {
    let crit = Math.random() < 0.2 ? 2 : 1;
    return Math.max(1, Math.floor(u.stats.power + Math.random() * 3) * crit);
  },

  update() {
    let b = Game.state.battle;

    document.getElementById("playerName").innerText = b.p.type;
    document.getElementById("enemyName").innerText = b.e.type;

    document.getElementById("playerHP").style.width =
      (b.p.stats.hp / b.p.stats.maxHp) * 100 + "%";

    document.getElementById("enemyHP").style.width =
      (b.e.stats.hp / b.e.stats.maxHp) * 100 + "%";
  },

  log(t) {
    const d = document.createElement("div");
    d.innerText = t;
    document.getElementById("battleLog").appendChild(d);
  }
};

Game.init();
</script>

</body>
</html>
