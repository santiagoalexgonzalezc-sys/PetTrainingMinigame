<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V13 RPG Framework Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0d18;
  color:white;
  text-align:center;
}

.scene { display:none; padding:20px; }
.scene.active { display:block; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#2a2f55;
  color:white;
  cursor:pointer;
}
button:hover { background:#3c4280; }

.petCard {
  background:rgba(255,255,255,0.08);
  margin:10px auto;
  padding:10px;
  width:260px;
  border-radius:10px;
}

.hpBar {
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.hpBar div {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00ff88,#00c3ff);
}

#log {
  max-height:180px;
  overflow:auto;
  font-size:13px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="scene active">
  <h1>🐾 V13 RPG FRAMEWORK</h1>
  <div id="petList"></div>

  <button onclick="Game.createPet('Fox')">Fox 🔥</button>
  <button onclick="Game.createPet('Cat')">Cat 🌙</button>
  <button onclick="Game.createPet('Dog')">Dog ⚡</button>
</div>

<!-- BATTLE -->
<div id="battle" class="scene">
  <h2>⚔️ Framework Battle</h2>

  <div id="playerName"></div>
  <div class="hpBar"><div id="playerHP"></div></div>

  <br>

  <div id="enemyName"></div>
  <div class="hpBar"><div id="enemyHP"></div></div>

  <h3>Skills</h3>
  <div id="skills"></div>

  <div id="log"></div>
</div>

<script>
/* =========================
   RPG FRAMEWORK CORE
========================= */

const Game = {
  state: {
    pets: JSON.parse(localStorage.getItem("pets")) || [],
    active: null,
    battle: null
  },

  scenes: {
    menu: document.getElementById("menu"),
    battle: document.getElementById("battle")
  },

  setScene(s) {
    Object.values(this.scenes).forEach(x => x.classList.remove("active"));
    this.scenes[s].classList.add("active");
  },

  save() {
    localStorage.setItem("pets", JSON.stringify(this.state.pets));
  },

  init() {
    this.render();
  },

  createPet(type) {
    this.state.pets.push({
      id: Date.now(),
      type,
      level: 1,
      stats: {
        hp: 25,
        maxHp: 25,
        atk: 5,
        def: 2
      },
      skills: ["attack", "fireball"]
    });

    this.save();
    this.render();
  },

  selectPet(id) {
    this.state.active = this.state.pets.find(p => p.id === id);
    Battle.start();
  },

  render() {
    const list = document.getElementById("petList");
    list.innerHTML = "";

    this.state.pets.forEach(p => {
      const d = document.createElement("div");
      d.className = "petCard";

      d.innerHTML = `
        ${p.type} Lv.${p.level}<br>
        <button onclick="Game.selectPet(${p.id})">Battle</button>
      `;

      list.appendChild(d);
    });
  }
};

/* =========================
   SKILL DATABASE (FRAMEWORK CORE)
========================= */

const Skills = {
  attack: {
    name: "Attack",
    cd: 0,
    use(a, d) {
      return Math.max(1, a.stats.atk - d.stats.def + rand(3));
    }
  },

  fireball: {
    name: "Fireball",
    cd: 2,
    use(a, d) {
      let dmg = a.stats.atk * 2 + rand(2);
      Status.apply(d, "burn", 2);
      return dmg;
    }
  }
};

/* =========================
   STATUS SYSTEM (FRAMEWORK CORE)
========================= */

const Status = {
  apply(target, type, turns) {
    if (!target.status) target.status = {};
    target.status[type] = turns;
  },

  tick(target, log) {
    if (!target.status) return;

    if (target.status.burn > 0) {
      target.stats.hp -= 2;
      log("🔥 Burn deals 2");
      target.status.burn--;
    }

    if (target.status.burn === 0) {
      delete target.status.burn;
    }
  }
};

/* =========================
   AI SYSTEM (FRAMEWORK CORE)
========================= */

const AI = {
  choose(enemy, player) {
    let hp = enemy.stats.hp / enemy.stats.maxHp;

    if (hp < 0.3 && enemy.skills.includes("heal")) return "heal";
    if (hp < 0.6 && Math.random() < 0.5) return "defend";

    return Math.random() < 0.7 ? "attack" : "fireball";
  }
};

/* =========================
   BATTLE ENGINE (FRAMEWORK CORE)
========================= */

const Battle = {
  start() {
    let p = Game.state.active;

    let e = {
      type: "Enemy",
      stats: { hp: 30, maxHp: 30, atk: 5, def: 2 },
      skills: ["attack", "fireball"],
      status: {}
    };

    Game.state.battle = {
      p: structuredClone(p),
      e
    };

    let b = Game.state.battle;
    b.p.status = {};

    this.renderSkills();
    this.update();

    Game.setScene("battle");
    this.log("Battle started");
  },

  renderSkills() {
    const s = document.getElementById("skills");
    let p = Game.state.battle.p;

    s.innerHTML = "";

    p.skills.forEach(sk => {
      let btn = document.createElement("button");
      btn.innerText = Skills[sk].name;
      btn.onclick = () => this.playerUse(sk);
      s.appendChild(btn);
    });
  },

  playerUse(skillName) {
    let b = Game.state.battle;

    let skill = Skills[skillName];

    let dmg = skill.use(b.p, b.e);
    b.e.stats.hp -= dmg;

    this.log("Player uses " + skill.name + " → " + dmg);

    this.tick();
  },

  enemyTurn() {
    let b = Game.state.battle;

    let action = AI.choose(b.e, b.p);

    if (Skills[action]) {
      let dmg = Skills[action].use(b.e, b.p);
      b.p.stats.hp -= dmg;
      this.log("Enemy uses " + Skills[action].name + " → " + dmg);
    }
  },

  tick() {
    let b = Game.state.battle;

    Status.tick(b.p, this.log);
    Status.tick(b.e, this.log);

    this.enemyTurn();

    this.update();
    this.checkEnd();
  },

  update() {
    let b = Game.state.battle;

    document.getElementById("playerName").innerText = b.p.type;
    document.getElementById("enemyName").innerText = b.e.type;

    document.getElementById("playerHP").style.width =
      (b.p.stats.hp / b.p.stats.maxHp) * 100 + "%";

    document.getElementById("enemyHP").style.width =
      (b.e.stats.hp / b.e.stats.maxHp) * 100 + "%";
  },

  checkEnd() {
    let b = Game.state.battle;

    if (b.p.stats.hp <= 0 && b.e.stats.hp <= 0) {
      alert("Draw");
      Game.setScene("menu");
    }
    else if (b.e.stats.hp <= 0) {
      alert("Win");
      Game.setScene("menu");
    }
    else if (b.p.stats.hp <= 0) {
      alert("Lose");
      Game.setScene("menu");
    }
  },

  log(t) {
    const d = document.createElement("div");
    d.innerText = t;
    document.getElementById("log").appendChild(d);
  }
};

function rand(n){ return Math.floor(Math.random()*n); }

Game.init();
</script>

</body>
</html>
