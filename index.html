<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet RPG V9 Engine</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0d18;
  color: white;
  text-align: center;
}

/* SPA SCENES */
.scene {
  display: none;
  padding: 20px;
}

.scene.active {
  display: block;
}

/* PET CARD */
.petCard {
  background: rgba(255,255,255,0.08);
  margin: 10px auto;
  padding: 10px;
  width: 260px;
  border-radius: 10px;
}

/* BUTTONS */
button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2a2f55;
  color: white;
}

button:hover {
  background: #3c4280;
}

/* TRAIN BAR */
#barContainer {
  width: 300px;
  height: 20px;
  margin: 20px auto;
  background: #222;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

#perfectZone {
  position: absolute;
  height: 100%;
  background: rgba(0,255,120,0.3);
  left: 40%;
  width: 20%;
}

#marker {
  position: absolute;
  width: 6px;
  height: 100%;
  background: white;
  left: 0%;
}

/* HP BAR */
.hpBar {
  width: 100%;
  height: 12px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

.hpBar div {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#00ff88,#00c3ff);
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="scene active">
  <h1>🐾 Pet RPG V9</h1>
  <div id="petList"></div>

  <h3>Create Pet</h3>
  <button onclick="Game.createPet('Fox')">🦊 Fox</button>
  <button onclick="Game.createPet('Cat')">🐱 Cat</button>
  <button onclick="Game.createPet('Dog')">🐶 Dog</button>
</div>

<!-- TRAINING -->
<div id="training" class="scene">
  <h2>Training</h2>

  <div id="barContainer">
    <div id="perfectZone"></div>
    <div id="marker"></div>
  </div>

  <button onclick="Training.startRun()">TRAIN</button>
  <p id="feedback"></p>
</div>

<!-- RESULT -->
<div id="result" class="scene">
  <h1>Result</h1>
  <p id="resultText"></p>
  <button onclick="Game.setScene('menu')">Back</button>
</div>

<!-- BATTLE -->
<div id="battle" class="scene">
  <h2>⚔️ Battle</h2>

  <div>
    <div id="playerName"></div>
    <div class="hpBar"><div id="playerHP"></div></div>
  </div>

  <br>

  <div>
    <div id="enemyName"></div>
    <div class="hpBar"><div id="enemyHP"></div></div>
  </div>

  <br>

  <button onclick="Battle.turn()">Next Turn</button>
  <div id="battleLog"></div>
</div>

<script>
/* =========================
   GAME ENGINE CORE
========================= */

const Game = {
  state: {
    pets: JSON.parse(localStorage.getItem("pets")) || [],
    activePet: null,
    battle: null,
    training: { pos: 0, dir: 1, running: false, interval: null }
  },

  scenes: {
    menu: document.getElementById("menu"),
    training: document.getElementById("training"),
    result: document.getElementById("result"),
    battle: document.getElementById("battle")
  },

  setScene(scene) {
    Object.values(this.scenes).forEach(s => s.classList.remove("active"));
    this.scenes[scene].classList.add("active");
  },

  save() {
    localStorage.setItem("pets", JSON.stringify(this.state.pets));
  },

  init() {
    this.renderPets();
    this.setScene("menu");
  },

  /* PET SYSTEM */
  createPet(type) {
    if (this.state.pets.length >= 5) return alert("Max 5 pets!");

    this.state.pets.push({
      id: Date.now(),
      type,
      level: 1,
      xp: 0,
      xpToLevel: 100,
      stats: { power: 2, hp: 10, maxHp: 10 }
    });

    this.save();
    this.renderPets();
  },

  deletePet(id) {
    this.state.pets = this.state.pets.filter(p => p.id !== id);
    this.save();
    this.renderPets();
  },

  selectPet(id) {
    this.state.activePet = this.state.pets.find(p => p.id === id);
    const mode = confirm("OK = Battle | Cancel = Training");
    mode ? Battle.start() : Training.start();
  },

  renderPets() {
    const list = document.getElementById("petList");
    list.innerHTML = "";

    this.state.pets.forEach(p => {
      const div = document.createElement("div");
      div.className = "petCard";

      div.innerHTML = `
        <div>
          ${p.type} Lv.${p.level}<br>
          XP ${p.xp}/${p.xpToLevel}
        </div>

        <div>
          <button onclick="Game.selectPet(${p.id})">Use</button>
          <button onclick="Game.deletePet(${p.id})">🗑</button>
        </div>
      `;

      list.appendChild(div);
    });
  }
};

/* =========================
   TRAINING SYSTEM
========================= */

const Training = {
  start() {
    Game.setScene("training");
    document.getElementById("feedback").innerText = "Press TRAIN at the right time";

    document.getElementById("perfectZone").style.left = "40%";
    document.getElementById("perfectZone").style.width = "20%";

    document.getElementById("marker").style.left = "0%";
  },

  startRun() {
    let t = Game.state.training;

    if (t.running) return;

    t.running = true;
    t.pos = 0;
    t.dir = 1;

    t.interval = setInterval(() => {
      t.pos += 2 * t.dir;

      if (t.pos >= 100) t.dir = -1;
      if (t.pos <= 0) t.dir = 1;

      document.getElementById("marker").style.left = t.pos + "%";
    }, 16);

    setTimeout(() => this.finish(), 2000);
  },

  finish() {
    let t = Game.state.training;
    clearInterval(t.interval);
    t.running = false;

    let pos = t.pos;

    let result =
      pos >= 40 && pos <= 60 ? "perfect" :
      pos >= 30 && pos <= 70 ? "good" :
      pos >= 20 && pos <= 80 ? "ok" : "miss";

    let xp =
      result === "perfect" ? 50 :
      result === "good" ? 25 :
      result === "ok" ? 10 : 3;

    let pet = Game.state.activePet;

    pet.xp += xp;

    if (pet.xp >= pet.xpToLevel) {
      pet.level++;
      pet.xp = 0;
      pet.xpToLevel += 50;
      pet.stats.power++;
      pet.stats.maxHp += 2;
    }

    Game.save();

    document.getElementById("resultText").innerText =
      `${result.toUpperCase()} +${xp} XP`;

    Game.setScene("result");
    Game.renderPets();
  }
};

/* =========================
   BATTLE SYSTEM
========================= */

const Battle = {
  start() {
    let p = Game.state.activePet;

    let enemy = {
      type: "Enemy",
      level: p.level,
      stats: {
        power: p.level + 2,
        hp: 10 + p.level * 2,
        maxHp: 10 + p.level * 2
      }
    };

    Game.state.battle = {
      player: structuredClone(p),
      enemy
    };

    let b = Game.state.battle;
    b.player.stats.hp = b.player.stats.maxHp;
    b.enemy.stats.hp = b.enemy.stats.maxHp;

    Game.setScene("battle");

    document.getElementById("battleLog").innerHTML = "";
    this.update();
  },

  turn() {
    let b = Game.state.battle;

    let pDmg = this.dmg(b.player);
    let eDmg = this.dmg(b.enemy);

    b.player.stats.hp -= eDmg;
    b.enemy.stats.hp -= pDmg;

    this.log(`You deal ${pDmg}`);
    this.log(`Enemy deals ${eDmg}`);

    this.update();

    if (b.player.stats.hp <= 0 || b.enemy.stats.hp <= 0) {
      alert(b.player.stats.hp > 0 ? "You Win!" : "You Lose!");
      Game.setScene("menu");
    }
  },

  dmg(u) {
    return Math.max(1, Math.floor(u.stats.power + Math.random() * 3));
  },

  update() {
    let b = Game.state.battle;

    document.getElementById("playerName").innerText = b.player.type;
    document.getElementById("enemyName").innerText = b.enemy.type;

    document.getElementById("playerHP").style.width =
      (b.player.stats.hp / b.player.stats.maxHp) * 100 + "%";

    document.getElementById("enemyHP").style.width =
      (b.enemy.stats.hp / b.enemy.stats.maxHp) * 100 + "%";
  },

  log(t) {
    const d = document.createElement("div");
    d.innerText = t;
    document.getElementById("battleLog").appendChild(d);
  }
};

/* INIT */
Game.init();
</script>

</body>
</html>
