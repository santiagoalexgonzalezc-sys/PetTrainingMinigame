<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 Pet Training RPG</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,#131827,#0b0d18);
    color:white;
    text-align:center;
}

.screen{
    display:none;
    padding:20px;
}

.screen.active{
    display:block;
}

h1,h2,h3{
    margin-top:10px;
}

button{
    border:none;
    border-radius:12px;
    padding:10px 16px;
    cursor:pointer;
    color:white;
    background:#2f3b7a;
    margin:4px;
    transition:.15s;
}

button:hover{
    transform:translateY(-2px);
}

.petCard{
    width:min(450px,90%);
    margin:10px auto;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:14px;
}

.stat{
    opacity:.9;
    font-size:.95rem;
}

.xpBar{
    width:100%;
    height:18px;
    background:#1f2230;
    border-radius:999px;
    overflow:hidden;
    margin-top:8px;
}

.xpFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d084,#00b7ff);
}

#barContainer{
    width:min(650px,90%);
    height:34px;
    background:#1d2232;
    border-radius:999px;
    margin:35px auto;
    position:relative;
    overflow:hidden;
}

.zone{
    position:absolute;
    top:0;
    height:100%;
}

#okZone{
    left:15%;
    width:70%;
    background:rgba(255,255,255,.08);
}

#goodZone{
    left:35%;
    width:30%;
    background:rgba(0,255,140,.12);
}

#perfectZone{
    left:47%;
    width:6%;
    background:rgba(255,255,140,.4);
}

#marker{
    position:absolute;
    top:0;
    width:8px;
    height:100%;
    background:white;
    box-shadow:0 0 10px white;
}

.bigResult{
    font-size:1.4rem;
    margin-top:20px;
    min-height:40px;
}

.selected{
    border:2px solid #00b7ff;
}

.infoBox{
    width:min(500px,90%);
    margin:auto;
    background:rgba(255,255,255,.06);
    border-radius:16px;
    padding:16px;
}
</style>

</head>
<body>

<!-- MAIN -->

<div id="mainScreen" class="screen active">
    <h1>🐾 Pet Training RPG</h1>
    <p>Maximum 5 pets</p>

```
<div id="petList"></div>

<div style="margin-top:20px;">
    <button onclick="createPet('Fox')">🦊 Create Fox</button>
    <button onclick="createPet('Cat')">🐱 Create Cat</button>
    <button onclick="createPet('Dog')">🐶 Create Dog</button>
</div>
```

</div>

<!-- PET -->

<div id="petScreen" class="screen">
    <h2 id="petTitle"></h2>

```
<div class="infoBox">
    <div id="petEvolution"></div>
    <br>

    <div id="petLevel"></div>
    <div id="petXP"></div>

    <div class="xpBar">
        <div id="petXPFill" class="xpFill"></div>
    </div>

    <br>

    <div id="petStats"></div>

    <br>

    <button onclick="openTraining()">🎯 Train</button>
    <button onclick="showScreen('mainScreen')">⬅ Back</button>
</div>
```

</div>

<!-- TRAIN -->

<div id="trainingScreen" class="screen">
    <h2>🎯 Training</h2>

```
<p>Stop the marker in the center!</p>

<div id="barContainer">
    <div id="okZone" class="zone"></div>
    <div id="goodZone" class="zone"></div>
    <div id="perfectZone" class="zone"></div>
    <div id="marker"></div>
</div>

<button id="stopBtn">STOP</button>
<button onclick="returnToPet()">Back</button>

<div id="trainResult" class="bigResult"></div>
```

</div>

<script>
let pets = JSON.parse(localStorage.getItem("pets")) || [];
let selectedPet = null;

let trainingRunning = false;
let markerPos = 0;
let direction = 1;
let animId = null;

function save(){
    localStorage.setItem("pets", JSON.stringify(pets));
}

function showScreen(id){
    document.querySelectorAll(".screen")
        .forEach(s=>s.classList.remove("active"));

    document.getElementById(id)
        .classList.add("active");
}

function xpNeeded(level){
    return level * 100;
}

function getEvolution(pet){

    const evo = {
        Fox:[
            "🦊 Fox",
            "🔥 Swift Fox",
            "👑 Spirit Fox"
        ],
        Cat:[
            "🐱 Cat",
            "🌙 Shadow Cat",
            "⭐ Star Cat"
        ],
        Dog:[
            "🐶 Dog",
            "🛡 Alpha Dog",
            "👑 Guardian Dog"
        ]
    };

    if(pet.level >= 10) return evo[pet.type][2];
    if(pet.level >= 5) return evo[pet.type][1];
    return evo[pet.type][0];
}

function createPet(type){

    if(pets.length >= 5){
        alert("Maximum 5 pets.");
        return;
    }

    pets.push({
        id:Date.now(),
        type,
        level:1,
        xp:0,
        stats:{
            power:1,
            agility:1
        }
    });

    save();
    renderPets();
}

function deletePet(id){

    if(!confirm("Delete this pet?")) return;

    pets = pets.filter(p=>p.id!==id);

    save();
    renderPets();
}

function renderPets(){

    const list = document.getElementById("petList");
    list.innerHTML = "";

    pets.forEach(p=>{

        const need = xpNeeded(p.level);
        const pct = (p.xp / need) * 100;

        const div = document.createElement("div");
        div.className = "petCard";

        div.innerHTML = `
            <h3>${getEvolution(p)}</h3>

            <div class="stat">
                Level ${p.level}
            </div>

            <div class="xpBar">
                <div class="xpFill" style="width:${pct}%"></div>
            </div>

            <div class="stat">
                XP ${p.xp} / ${need}
            </div>

            <br>

            <button onclick="selectPet(${p.id})">
                Select
            </button>

            <button onclick="deletePet(${p.id})">
                Delete
            </button>
        `;

        list.appendChild(div);
    });
}

function selectPet(id){

    selectedPet = pets.find(p=>p.id===id);

    updatePetScreen();

    showScreen("petScreen");
}

function updatePetScreen(){

    if(!selectedPet) return;

    const need = xpNeeded(selectedPet.level);

    document.getElementById("petTitle").textContent =
        selectedPet.type;

    document.getElementById("petEvolution").textContent =
        getEvolution(selectedPet);

    document.getElementById("petLevel").textContent =
        "Level: " + selectedPet.level;

    document.getElementById("petXP").textContent =
        `XP: ${selectedPet.xp} / ${need}`;

    document.getElementById("petXPFill").style.width =
        (selectedPet.xp / need * 100) + "%";

    document.getElementById("petStats").innerHTML =
        `
        ⚔ Power: ${selectedPet.stats.power}<br>
        ⚡ Agility: ${selectedPet.stats.agility}
        `;
}

function openTraining(){

    document.getElementById("trainResult").textContent = "";

    showScreen("trainingScreen");

    startTraining();
}

function startTraining(){

    cancelAnimationFrame(animId);

    trainingRunning = true;
    markerPos = 0;
    direction = 1;

    const marker = document.getElementById("marker");

    function loop(){

        if(!trainingRunning) return;

        markerPos += direction * 0.7;

        if(markerPos >= 100){
            markerPos = 100;
            direction = -1;
        }

        if(markerPos <= 0){
            markerPos = 0;
            direction = 1;
        }

        marker.style.left = markerPos + "%";

        animId = requestAnimationFrame(loop);
    }

    loop();
}

document.getElementById("stopBtn")
.addEventListener("click", ()=>{

    if(!trainingRunning) return;

    trainingRunning = false;

    let xp = 0;
    let text = "";

    if(markerPos >= 47 && markerPos <= 53){
        xp = 35;
        text = "🌟 PERFECT! +35 XP";
    }
    else if(markerPos >= 35 && markerPos <= 65){
        xp = 20;
        text = "✅ GOOD! +20 XP";
    }
    else if(markerPos >= 15 && markerPos <= 85){
        xp = 10;
        text = "👍 OK! +10 XP";
    }
    else{
        xp = 5;
        text = "❌ MISS! +5 XP";
    }

    gainXP(selectedPet,xp);

    document.getElementById("trainResult").textContent = text;

    save();
});

function gainXP(pet,amount){

    pet.xp += amount;

    while(pet.xp >= xpNeeded(pet.level)){

        pet.xp -= xpNeeded(pet.level);

        pet.level++;

        pet.stats.power += 1;
        pet.stats.agility += 1;

        if(pet.level % 5 === 0){
            pet.stats.power += 2;
        }
    }
}

function returnToPet(){
    updatePetScreen();
    showScreen("petScreen");
}

renderPets();
</script>

</body>
</html>
